{{ $images := resources.Match "img/mood/*" }}
<div style="
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
  margin-top: 2rem;
">
  {{ range $images }}
  <img
    src="{{ .RelPermalink }}"
    style="
      width: 100%;
      max-width: 800px;
      display: block;
      border-radius: 8px;
    "
    loading="lazy"
  />
  {{ end }}
</div>
