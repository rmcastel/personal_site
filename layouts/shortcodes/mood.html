{{ $images := resources.Match "img/mood/*.{jpg,jpeg,png,gif,webp}" }}
{{ $sorted := sort $images "Name" "asc" }}
<div style="
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
  margin-top: 2rem;
">
  {{ range $sorted }}
  <img
    src="{{ .RelPermalink }}"
    style="
      width: 100%;
      max-width: 800px;
      display: block;
      border-radius: 8px;
    "
    loading="lazy"
  />
  {{ end }}
</div>
